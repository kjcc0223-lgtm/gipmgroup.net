backend:
  name: git-gateway
  branch: main

locale: "ko"
site_url: "https://gipmgroup.net"
display_url: "https://gipmgroup.net"
logo_url: "/logo.png"

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "site"
    label: "홈페이지 기본 정보"
    delete: false
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "홈페이지"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "브라우저 제목", name: "page_title", widget: "string" }
          - { label: "상단 영문명", name: "brand_en", widget: "string", required: false }
          - { label: "상단 기관명", name: "brand_ko", widget: "string" }
          - { label: "메인 제목", name: "hero_title", widget: "text", hint: "줄바꿈은 <br> 사용 가능" }
          - { label: "메인 설명", name: "hero_description", widget: "text" }
          - { label: "푸터 기관명", name: "footer_org_name", widget: "string" }
          - { label: "푸터 설명", name: "footer_description", widget: "text" }
          - { label: "주소", name: "contact_address", widget: "string" }
          - { label: "전화번호", name: "contact_phone", widget: "string" }
          - { label: "이메일", name: "contact_email", widget: "string" }
          - { label: "하단 저작권 문구", name: "footer_copyright", widget: "text" }
