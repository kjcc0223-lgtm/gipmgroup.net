backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site"
    label: "사이트 기본정보"
    files:
      - label: "기본 정보"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "사이트명", name: "site_name", widget: "string" }
          - { label: "메인 제목", name: "hero_title", widget: "string" }
          - { label: "메인 설명", name: "hero_text", widget: "text" }
          - { label: "푸터 설명", name: "footer_text", widget: "string" }
          - { label: "주소", name: "address", widget: "string" }
          - { label: "전화", name: "phone", widget: "string" }
          - { label: "이메일", name: "email", widget: "string" }
          - { label: "저작권", name: "copyright", widget: "string" }
